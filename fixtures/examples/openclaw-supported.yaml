configVersion: 1
userName: multipass

x-openclaw-bridge: &openclaw-bridge
  adapter: script
  env:
    - OPENCLAW_URL
    - OPENCLAW_TOKEN
  script:
    commands:
      probe: node ./scripts/openclaw-bridge-probe.mjs
      send: node ./scripts/openclaw-bridge-send.mjs
      waitForInbound: node ./scripts/openclaw-bridge-wait.mjs
      watch: node ./scripts/openclaw-bridge-watch.mjs

providers:
  bluebubbles-openclaw:
    <<: *openclaw-bridge
    platform: bluebubbles
  discord-openclaw:
    <<: *openclaw-bridge
    platform: discord
  feishu-openclaw:
    <<: *openclaw-bridge
    platform: feishu
  googlechat-openclaw:
    <<: *openclaw-bridge
    platform: googlechat
  imessage-openclaw:
    <<: *openclaw-bridge
    platform: imessage
  irc-openclaw:
    <<: *openclaw-bridge
    platform: irc
  line-openclaw:
    <<: *openclaw-bridge
    platform: line
  matrix-openclaw:
    <<: *openclaw-bridge
    platform: matrix
  mattermost-openclaw:
    <<: *openclaw-bridge
    platform: mattermost
  msteams-openclaw:
    <<: *openclaw-bridge
    platform: msteams
  nextcloudtalk-openclaw:
    <<: *openclaw-bridge
    platform: nextcloudtalk
  nostr-openclaw:
    <<: *openclaw-bridge
    platform: nostr
  signal-openclaw:
    <<: *openclaw-bridge
    platform: signal
  slack-openclaw:
    <<: *openclaw-bridge
    platform: slack
  synologychat-openclaw:
    <<: *openclaw-bridge
    platform: synologychat
  telegram-openclaw:
    <<: *openclaw-bridge
    platform: telegram
  tlon-openclaw:
    <<: *openclaw-bridge
    platform: tlon
  twitch-openclaw:
    <<: *openclaw-bridge
    platform: twitch
  webchat-openclaw:
    <<: *openclaw-bridge
    platform: webchat
  whatsapp-openclaw:
    <<: *openclaw-bridge
    platform: whatsapp
  zalo-openclaw:
    <<: *openclaw-bridge
    platform: zalo
  zalouser-openclaw:
    <<: *openclaw-bridge
    platform: zalouser

fixtures:
  - id: slack-openclaw-agent
    provider: slack-openclaw
    mode: agent
    target:
      id: REPLACE_ME
      channelId: REPLACE_ME
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: discord-openclaw-roundtrip
    provider: discord-openclaw
    mode: roundtrip
    target:
      id: REPLACE_ME
      channelId: REPLACE_ME
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: telegram-openclaw-roundtrip
    provider: telegram-openclaw
    mode: roundtrip
    target:
      id: REPLACE_ME # Telegram user id; use a dedicated human/MTProto test account, not another bot
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: whatsapp-openclaw-roundtrip
    provider: whatsapp-openclaw
    mode: roundtrip
    target:
      id: REPLACE_ME
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains
